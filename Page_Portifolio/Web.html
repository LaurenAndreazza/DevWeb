<html lang="pt-br">

<head>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header class="header-outer">
        <div class="header-inner responsive-wrapper">
            <nav class="header-navigation">
                <ol>
                    <li><a href="https://www.linkedin.com/in/lauren-andreazza/?originalSubdomain=br">Lauren
                            Andreazza</a></li>
                    <li><a href="">Henrique Pierre Veloso</a></li>
                    <li><a href="https://www.linkedin.com/in/eduarda-palmeiro-bruck-da-silva-023674389/">Maria Eduarda
                        </a></li>
                    <li><a href="https://www.linkedin.com/in/taylor-cassimiro/">Taylor Cassimiro </a></li>
                    <li><a href="https://www.linkedin.com/in/andrius-anselmi/">Andrius Anselmi</a></li>
                    <li><a href="E-mails.html">E-mails</a></li>

                </ol>
            </nav>
        </div>
    </header>

    <main>
        <form method="post" action="https://elgio.prof.nom.br/web/le/">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo">
            <label for="email">E-mail:</label>
            <input type="email" id="email" name="email" placeholder="Digite seu e-mail">
            <label for="Senha">Senha:</label>
            <input type="password" id="senha" name="senha" placeholder="Digite sua senha">
            <p class="radio-title">Localidade:</p>
            <div class="radio-group">
                <div class="radio-option">
                    <input type="radio" id="poa" name="localidade" value="Porto Alegre">
                    <label for="poa">Porto Alegre</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="canoas" name="localidade" value="Canoas">
                    <label for="canoas">Canoas</label>
                </div>
                <div class="radio-option">
                    <input type="radio" id="gravatai" name="localidade" value="Gravataí">
                    <label for="gravatai">Gravataí</label>
                </div>
            </div>
            <label for="mensagem">Mensagem:</label>
            <textarea id="mensagem" name="mensagem" rows="4" cols="50" placeholder="Digite sua mensagem"></textarea>
            <button type="submit">Enviar</button>
        </form>
    </main>

    <footer></footer>

</body>

</html>
